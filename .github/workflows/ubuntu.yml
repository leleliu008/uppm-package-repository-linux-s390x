name: Ubuntu

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  test:

    strategy:
      fail-fast: false
      matrix:
        version: [22.04, 20.04]

    steps:
      - uses: actions/checkout@v3
      - run: |
          # https://github.com/multiarch/qemu-user-static
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          docker run --rm -it -v $PWD:/root -w /root s390x/ubuntu:${{ matrix.tag }} ./test.sh
